name: Go Build and Test

on:
  workflow_call:
    inputs:
      app_name:
        description: Application name used in job names
        required: true
        type: string
      go_version:
        description: Go version to install
        required: true
        type: string
      cache_dependency_path:
        description: Optional dependency file used by actions/setup-go cache
        required: false
        default: ""
        type: string
      download_dependencies_dir:
        description: Directory where go mod download should run
        required: false
        default: .
        type: string
      lint_working_directory:
        description: Working directory for golangci-lint
        required: true
        type: string
      lint_args:
        description: Arguments passed to golangci-lint
        required: false
        default: --timeout 5m
        type: string
      lint_skip_cache:
        description: Skip golangci-lint cache
        required: false
        default: false
        type: boolean
      lint_skip_save_cache:
        description: Skip saving golangci-lint cache
        required: false
        default: false
        type: boolean
      test_suites_json:
        description: JSON array of test suites with name, working_directory, and command
        required: true
        type: string
      image_repository:
        description: Full OCI image repository without tag
        required: true
        type: string
      image_title:
        description: OCI image title label
        required: true
        type: string
      image_description:
        description: OCI image description label
        required: true
        type: string
      docker_context:
        description: Docker build context path
        required: false
        default: .
        type: string
      dockerfile_path:
        description: Dockerfile path
        required: false
        default: ./Dockerfile
        type: string
      build_platforms:
        description: Target build platforms
        required: false
        default: linux/amd64
        type: string
      sha_tag_format:
        description: SHA tag format used by docker/metadata-action
        required: false
        default: long
        type: string
      publish_image:
        description: Whether the container image should be pushed
        required: false
        default: true
        type: boolean
    secrets:
      GO_MODULES_TOKEN:
        required: false

jobs:
  lint:
    name: Lint ${{ inputs.app_name }} app
    runs-on: ubuntu-latest
    env:
      GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        if: inputs.cache_dependency_path == ''
        with:
          go-version: ${{ inputs.go_version }}

      - uses: actions/setup-go@v6.4.0
        if: inputs.cache_dependency_path != ''
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Configure private Go module access
        if: env.GO_MODULES_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          git config --global url."https://x-access-token:${GO_MODULES_TOKEN}@github.com/".insteadOf https://github.com/
          go env -w GOPRIVATE=github.com/nanostack-dev/*
          go env -w GONOSUMDB=github.com/nanostack-dev/*

      - name: Download dependencies first
        run: |
          cd "${{ inputs.download_dependencies_dir }}"
          go mod download

      - uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest
          working-directory: ${{ inputs.lint_working_directory }}
          args: ${{ inputs.lint_args }}
          skip-cache: ${{ inputs.lint_skip_cache }}
          skip-save-cache: ${{ inputs.lint_skip_save_cache }}

  tests:
    name: Test ${{ inputs.app_name }} app
    runs-on: ubuntu-latest
    needs: lint
    env:
      GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.4.0
        if: inputs.cache_dependency_path == ''
        with:
          go-version: ${{ inputs.go_version }}

      - uses: actions/setup-go@v6.4.0
        if: inputs.cache_dependency_path != ''
        with:
          go-version: ${{ inputs.go_version }}
          cache-dependency-path: ${{ inputs.cache_dependency_path }}

      - name: Configure private Go module access
        if: env.GO_MODULES_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail

          git config --global url."https://x-access-token:${GO_MODULES_TOKEN}@github.com/".insteadOf https://github.com/
          go env -w GOPRIVATE=github.com/nanostack-dev/*
          go env -w GONOSUMDB=github.com/nanostack-dev/*

      - name: Download dependencies first
        run: |
          cd "${{ inputs.download_dependencies_dir }}"
          go mod download

      - name: Install gotestsum
        run: |
          go install gotest.tools/gotestsum@v1.13.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run configured test suites
        shell: bash
        env:
          TEST_SUITES_JSON: ${{ inputs.test_suites_json }}
        run: |
          set -euo pipefail
          failed=0

          while IFS= read -r suite; do
            name="$(printf '%s' "$suite" | jq -r '.name')"
            working_directory="$(printf '%s' "$suite" | jq -r '.working_directory')"
            command="$(printf '%s' "$suite" | jq -r '.command')"

            echo "::group::$name"
            if ! (cd "$working_directory" && bash -lc "$command"); then
              echo "$name failed"
              failed=1
            fi
            echo "::endgroup::"
          done < <(printf '%s' "$TEST_SUITES_JSON" | jq -c '.[]')

          exit "$failed"

  docker-push:
    name: Build and Push Container Image
    runs-on: ubuntu-latest
    needs: [lint, tests]
    if: inputs.publish_image
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure SHA tag format
        id: tag_config
        shell: bash
        run: |
          set -euo pipefail

          case '${{ inputs.sha_tag_format }}' in
            long)
              echo 'sha_tag=type=sha,prefix=sha-,format=long' >> "$GITHUB_OUTPUT"
              ;;
            short)
              echo 'sha_tag=type=sha,prefix=sha-' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported sha_tag_format: ${{ inputs.sha_tag_format }}" >&2
              exit 1
              ;;
          esac

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ inputs.image_repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            ${{ steps.tag_config.outputs.sha_tag }}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ inputs.image_title }}
            org.opencontainers.image.description=${{ inputs.image_description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@v7.0.0
        with:
          context: ${{ inputs.docker_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.build_platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve deploy image tag
        id: deploy_tag
        shell: bash
        run: |
          set -euo pipefail

          case '${{ inputs.sha_tag_format }}' in
            long)
              deploy_image_tag="sha-${GITHUB_SHA}"
              ;;
            short)
              deploy_image_tag="sha-${GITHUB_SHA:0:7}"
              ;;
            *)
              echo "Unsupported sha_tag_format: ${{ inputs.sha_tag_format }}" >&2
              exit 1
              ;;
          esac

          echo "deploy_image_tag=$deploy_image_tag" >> "$GITHUB_OUTPUT"

      - name: Write deploy metadata
        shell: bash
        run: |
          set -euo pipefail
          cat > deploy-metadata.env <<EOF
          image_repository=${{ inputs.image_repository }}
          image_tag=${{ steps.deploy_tag.outputs.deploy_image_tag }}
          image_digest=${{ steps.build.outputs.digest }}
          git_sha=${GITHUB_SHA}
          EOF

      - name: Upload deploy metadata
        uses: actions/upload-artifact@v7.0.0
        with:
          name: deploy-metadata
          path: deploy-metadata.env
          if-no-files-found: error
